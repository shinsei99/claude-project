name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        run: |
          # デプロイ対象ファイルのチェックサムを記録
          SRC_SHA=$(sha256sum scrapmemo-petapeta/index.html | awk '{print $1}')
          echo "Source SHA256: $SRC_SHA"

          # デプロイ対象フォルダを一時保存
          cp -r scrapmemo-petapeta /tmp/scrapmemo-petapeta

          # gh-pagesブランチに切り替え
          git fetch origin gh-pages
          git checkout gh-pages

          # 既存フォルダを削除してからコピー（二重パス防止）
          rm -rf ./scrapmemo-petapeta
          cp -r /tmp/scrapmemo-petapeta ./scrapmemo-petapeta

          # デプロイ後のチェックサムを検証
          DEST_SHA=$(sha256sum scrapmemo-petapeta/index.html | awk '{print $1}')
          echo "Dest SHA256:   $DEST_SHA"
          if [ "$SRC_SHA" != "$DEST_SHA" ]; then
            echo "ERROR: ファイルのコピーに失敗しました（チェックサム不一致）"
            exit 1
          fi
          echo "チェックサム一致: コピー成功"

          # 変更があればコミット＆プッシュ
          git add scrapmemo-petapeta/
          if git diff --cached --quiet; then
            echo "変更なし、スキップ"
          else
            git commit -m "Deploy: ${{ github.event.head_commit.message }}"
            git push origin gh-pages
          fi
