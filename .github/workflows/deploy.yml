name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        run: |
          DEPLOY_FOLDERS="scrapmemo-petapeta mom-counter"

          # 各フォルダを一時保存
          for FOLDER in $DEPLOY_FOLDERS; do
            cp -r $FOLDER /tmp/$FOLDER
          done

          # gh-pagesブランチに切り替え
          git fetch origin gh-pages
          git checkout gh-pages

          # 各フォルダをコピー＆検証
          for FOLDER in $DEPLOY_FOLDERS; do
            SRC_SHA=$(sha256sum /tmp/$FOLDER/index.html | awk '{print $1}')
            rm -rf ./$FOLDER
            cp -r /tmp/$FOLDER ./$FOLDER
            DEST_SHA=$(sha256sum ./$FOLDER/index.html | awk '{print $1}')
            if [ "$SRC_SHA" != "$DEST_SHA" ]; then
              echo "ERROR: $FOLDER のコピーに失敗しました（チェックサム不一致）"
              exit 1
            fi
            echo "$FOLDER: チェックサム一致"
            git add $FOLDER/
          done

          # 変更があればコミット＆プッシュ
          if git diff --cached --quiet; then
            echo "変更なし、スキップ"
          else
            git commit -m "Deploy: ${{ github.event.head_commit.message }}"
            git push origin gh-pages
          fi
