<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>にゃんこ大脱出 🐱</title>
<style>
  :root{
    --wood1:#e9d8b8; --wood2:#e0cba0; --line:#2b2320; --ink:#2b2320;
    --paper:#fffdf5; --accent:#c85a3a; --accent2:#5a8f6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    color:var(--ink);
    background:
      repeating-linear-gradient(90deg, transparent 0 78px, rgba(0,0,0,.04) 78px 80px),
      linear-gradient(160deg,var(--wood1),var(--wood2));
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:10px 10px 30px;
  }
  h1{
    font-size:clamp(20px,5vw,30px);margin:8px 0 2px;letter-spacing:.05em;
    text-shadow:2px 2px 0 #fff;
  }
  .sub{font-size:12px;opacity:.7;margin-bottom:8px;}

  .hud{
    width:100%;max-width:740px;display:flex;justify-content:space-between;
    align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;
  }
  .badge{
    background:var(--paper);border:3px solid var(--line);border-radius:14px;
    padding:6px 12px;font-weight:800;font-size:14px;
    box-shadow:2px 3px 0 rgba(0,0,0,.25);
  }
  .turn-cat{color:var(--accent2);}
  .turn-robot{color:var(--accent);}

  .board-wrap{
    width:100%;max-width:740px;position:relative;
    background:var(--paper);
    border:5px solid var(--line);border-radius:22px;
    box-shadow:5px 7px 0 rgba(0,0,0,.28);
    padding:10px;
  }
  .board{
    position:relative;width:100%;aspect-ratio:1.5/1;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,.6), transparent 60%),
      repeating-linear-gradient(45deg,#f3ead2 0 22px,#efe4c6 22px 44px);
    border-radius:14px;overflow:hidden;
  }
  svg.edges{position:absolute;inset:0;width:100%;height:100%;}
  .node{
    position:absolute;width:min(9.2vw,46px);height:min(9.2vw,46px);
    transform:translate(-50%,-50%);
    background:var(--paper);border:4px solid var(--line);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    cursor:default;transition:transform .12s;
    box-shadow:1px 2px 0 rgba(0,0,0,.25);
    font-size:min(5vw,24px);
    z-index:2;
  }
  .node.reach{cursor:pointer;border-color:var(--accent2);
    box-shadow:0 0 0 4px rgba(90,143,107,.35),1px 2px 0 rgba(0,0,0,.25);}
  .node.reach:hover{transform:translate(-50%,-50%) scale(1.12);}
  .gimmick{position:absolute;top:-10px;right:-10px;font-size:min(4.4vw,20px);
    filter:drop-shadow(1px 2px 1px rgba(0,0,0,.35));pointer-events:none;}
  .occupant{
    font-size:min(7.2vw,34px);
    filter:drop-shadow(2px 4px 2px rgba(0,0,0,.4));
    pointer-events:none;line-height:1;
  }
  .cat.moved{animation:hop .3s;}
  .cat.caught{animation:jump .6s;}
  @keyframes hop{0%{transform:translateY(0)}40%{transform:translateY(-8px) rotate(-6deg)}100%{transform:translateY(0)}}
  @keyframes jump{0%{transform:translateY(0)}30%{transform:translateY(-22px) rotate(12deg)}60%{transform:translateY(-6px) rotate(-8deg)}100%{transform:translateY(0)}}
  .robot.err{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px) rotate(-8deg)}75%{transform:translateX(4px) rotate(8deg)}}

  .msg{
    width:100%;max-width:740px;min-height:26px;margin-top:8px;text-align:center;
    font-weight:800;font-size:15px;color:var(--ink);
  }
  .controls{margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  button{
    font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;
    background:var(--accent);color:#fff;border:3px solid var(--line);
    border-radius:14px;padding:9px 18px;box-shadow:2px 3px 0 rgba(0,0,0,.3);
  }
  button.ghost{background:var(--paper);color:var(--ink);}
  button:active{transform:translate(1px,2px);box-shadow:1px 1px 0 rgba(0,0,0,.3);}

  .overlay{
    position:fixed;inset:0;background:rgba(43,35,32,.55);
    display:none;align-items:center;justify-content:center;z-index:50;padding:16px;
  }
  .overlay.show{display:flex;}
  .card{
    background:var(--paper);border:5px solid var(--line);border-radius:22px;
    padding:26px 22px;text-align:center;max-width:420px;width:100%;
    box-shadow:6px 8px 0 rgba(0,0,0,.35);animation:pop .3s;
  }
  @keyframes pop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
  .card .big{font-size:56px;margin:0 0 6px;}
  .card h2{margin:4px 0 6px;font-size:24px;}
  .card p{margin:6px 0 16px;font-size:15px;line-height:1.5;}
  .legend{
    width:100%;max-width:740px;margin-top:14px;background:var(--paper);
    border:3px dashed var(--line);border-radius:14px;padding:10px 14px;
    font-size:13px;line-height:1.9;
  }
  .legend b{font-size:16px;}
</style>
</head>
<body>
  <h1>🐱 にゃんこ大脱出</h1>

  <div class="controls">
    <button class="ghost" id="resetBtn">このステージをやり直す</button>
  </div>

  <div class="legend">
    <b>🐱</b> ねこ（きみ）　<b>🤖</b> おそうじロボット（てき）　<b>🏰</b> キャットタワー（ゴール）<br>
    <b>🛋️</b> ソファ：ロボットは通れない（ねこの安全地帯！）

    <b>🐟</b> おさかな：ねこが乗るともう1マス動ける
    <b>🕳️</b> 落とし穴：ロボットが乗ると落ちて退場！（ねこは平気）
  </div>

  <div class="overlay" id="overlay">
    <div class="card">
      <div class="big" id="ovIcon">🎉</div>

/* ===================== ゲーム状態 ===================== */
let stageIdx = 0;
let S = null;      // 現在ステージ（コピー）
let adj = [];      // 隣接リスト
let cat = 0;       // 猫の現在ノード
let robots = [];   // [{node, stun}]
let fishLeft = new Set();
let yarnLeft = new Set();
let trapLeft = new Set();
let turn = 'cat';
let busy = false;
let over = false;
let justMovedCat = -1;
let errRobots = new Set();

const board = document.getElementById('board');
const edgesSvg = document.getElementById('edges');

function buildAdj(){
  adj = S.nodes.map(()=>[]);
  S.edges.forEach(([a,b])=>{ adj[a].push(b); adj[b].push(a); });
}

function loadStage(i){
  const src = STAGES[i];
  S = JSON.parse(JSON.stringify(src));
  buildAdj();
  cat = S.cat;
  robots = S.robots.map(n=>({node:n, stun:0}));
  fishLeft = new Set(S.fish);
  yarnLeft = new Set(S.yarn);
  trapLeft = new Set(S.trap || []);
  turn = 'cat'; over = false; busy = false; justMovedCat = -1; errRobots.clear();
  document.getElementById('stageBadge').textContent = `Stage ${i+1} / ${STAGES.length}`;
  document.getElementById('stageName').textContent = S.name;
  setMsg("となりのマスをクリックして、うごこう！");
  render();
}

/* ===================== 描画 ===================== */
function setTurnBadge(){
  const b = document.getElementById('turnBadge');
  if(turn==='cat'){ b.textContent='🐱 ねこのターン'; b.className='badge turn-cat'; }
  else { b.textContent='🤖 ロボットのターン'; b.className='badge turn-robot'; }
}
function setMsg(t){ document.getElementById('msg').textContent = t; }

function isSofa(n){ return S.sofa.includes(n); }

function render(){
  setTurnBadge();
  // edges
  let lines = '';
  S.edges.forEach(([a,b])=>{
    const p=S.nodes[a], q=S.nodes[b];
    lines += `<line x1="${p[0]}" y1="${p[1]}" x2="${q[0]}" y2="${q[1]}"
      stroke="#2b2320" stroke-width="4" stroke-linecap="round"
      vector-effect="non-scaling-stroke"/>`;
  });
  edgesSvg.innerHTML = lines;

  // remove old nodes
  [...board.querySelectorAll('.node')].forEach(e=>e.remove());

  const reachable = new Set();
  if(turn==='cat' && !over){ adj[cat].forEach(n=>reachable.add(n)); }

  S.nodes.forEach((pos,i)=>{
    const el = document.createElement('div');
    el.className = 'node';
    el.style.left = pos[0]+'%';
    el.style.top  = pos[1]+'%';

    // gimmick badge
    let gimmick = '';
    if(isSofa(i)) gimmick = '🛋️';
    else if(trapLeft.has(i)) gimmick = '🕳️';
    else if(yarnLeft.has(i)) gimmick = '🧶';
    else if(fishLeft.has(i)) gimmick = '🐟';

    // occupant
    let occ = '';
    let occClass = '';
    const robotsHere = robots.filter(r=>r.node===i);
    if(i===cat){
      occ = '🐱';
      occClass = 'cat' + (justMovedCat===i?' moved':'') + (over && robotsHere.length?' caught':'');
    } else if(robotsHere.length){
      occ = robotsHere.length>1 ? '🤖' : '🤖';
      occClass = 'robot' + (robotsHere.some(r=>errRobots.has(r))?' err':'');
    } else if(i===S.goal){
      occ = '🏰';
    }
    // 猫と同じマスにロボット（ゲームオーバー時）→ ロボットも重ねて表示
    if(i===cat && robotsHere.length && over){
      el.innerHTML = `<span class="occupant robot">🤖</span>`;
    }

    let inner = '';
    if(gimmick) inner += `<span class="gimmick">${gimmick}</span>`;
    if(occ) inner += `<span class="occupant ${occClass}">${occ}</span>`;
    else if(i===S.goal) inner += `<span class="occupant">🏰</span>`;
    el.innerHTML += inner;

    if(reachable.has(i)){
      el.classList.add('reach');
      el.onclick = ()=>onCatMove(i);
    }
    board.appendChild(el);
  });
}

/* ===================== 猫の移動 ===================== */
function onCatMove(n){
  if(turn!=='cat' || over || busy) return;
  if(!adj[cat].includes(n)) return;
  justMovedCat = n;
  cat = n;

  // ゴール判定
  if(cat===S.goal){ render(); win(); return; }

  // おさかな：もう1マス動ける
  if(fishLeft.has(cat)){
    fishLeft.delete(cat);
    setMsg("🐟 おさかなゲット！ もう1マスうごけるよ！");
    render();
    return; // 猫のターン継続
  }

  // 通常：ロボットのターンへ
  render();
  setTimeout(robotTurn, 350);
}

/* ===================== ロボットのターン ===================== */
function bfsStep(from, to){
  // sofa と 他ロボットの居るマスは進入不可。最短経路の次の1マスを返す
  const blocked = new Set(S.sofa);
  robots.forEach(r=>{ if(r.node!==from) blocked.add(r.node); });
  if(from===to) return null;
  const prev = new Array(S.nodes.length).fill(-2);
  prev[from] = -1;
  const q = [from];
  while(q.length){
    const cur = q.shift();
    for(const nx of adj[cur]){
      if(prev[nx]!==-2) continue;
      if(nx!==to && blocked.has(nx)) continue; // ゴール(=猫)以外はブロック回避
      prev[nx] = cur;
      if(nx===to){ q.length=0; break; }
      q.push(nx);
    }
  }
  if(prev[to]===-2) return null; // 到達不能
  // 経路を逆にたどって from の次のマスを求める
  let node = to;
  while(prev[node]!==from) node = prev[node];
  return node;
}

function robotTurn(){
  turn = 'robot'; busy = true; errRobots.clear();
  render();

  let idx = 0;
  const stepOne = ()=>{
    if(idx>=robots.length || over){ endRobotTurn(); return; }
    const r = robots[idx];

    if(r.stun>0){
      r.stun--;
      errRobots.add(r);
      setMsg("🤖 「エラー…毛糸がからまった！」");
      render();
      idx++;
      setTimeout(stepOne, 550);
      return;
    }

    const next = bfsStep(r.node, cat);
    if(next!==null){
      r.node = next;
      // 毛糸玉に乗った？
      if(yarnLeft.has(r.node)){
        yarnLeft.delete(r.node);
        r.stun = 1; // 次のターン動けない
      }
    }
    render();

    // 捕まった判定
    if(r.node===cat){ over=true; render(); setTimeout(lose, 250); return; }

    // 落とし穴に落ちた？（穴は残る・ロボットは退場）
    if(trapLeft.has(r.node)){
      robots.splice(idx, 1);   // このロボットを除去（idxは進めない）
      setMsg("🕳️ ロボットが落とし穴に落ちた！");
      render();
      setTimeout(stepOne, 550);
      return;
    }

    idx++;
    setTimeout(stepOne, 450);
  };
  setTimeout(stepOne, 300);
}

function endRobotTurn(){
  if(over) return;
  turn = 'cat'; busy = false; justMovedCat = -1;
  setMsg("きみのターン！ にげきろう！");
  render();
}

/* ===================== 勝敗 ===================== */
function win(){
  over = true;
  if(stageIdx >= STAGES.length-1){
    showOverlay('🏆', '完全脱出成功！', '最高のタワーでお昼寝タイム🐾<br>ぜんぶのステージをクリアしたよ！おめでとう！', 'もう一度あそぶ', ()=>{ stageIdx=0; hideOverlay(); loadStage(0); });
  } else {
    showOverlay('🎉', 'ステージクリア！', `キャットタワーに とうちゃく！<br>つぎは Stage ${stageIdx+2} だよ`, '次のステージへ', ()=>{ stageIdx++; hideOverlay(); loadStage(stageIdx); });
  }
}
function lose(){
  const lines = ['お尻を吸われそうになった！','ロボットにつかまっちゃった！','あわや、丸のみ！','ヒゲがはさまった！'];
  const t = lines[(cat+stageIdx)%lines.length];
  showOverlay('😹', 'つかまっちゃった！', t+'<br>もう一度チャレンジ！', 'このステージをやり直す', ()=>{ hideOverlay(); loadStage(stageIdx); });
}

/* ===================== オーバーレイ ===================== */
const overlay = document.getElementById('overlay');
function showOverlay(icon,title,text,btn,cb){
  document.getElementById('ovIcon').textContent = icon;
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovText').innerHTML = text;
  const b = document.getElementById('ovBtn');
  b.textContent = btn;
  b.onclick = cb;
  overlay.classList.add('show');
}
function hideOverlay(){ overlay.classList.remove('show'); }

document.getElementById('resetBtn').onclick = ()=>{ hideOverlay(); loadStage(stageIdx); };

/* ===================== 開始 ===================== */
loadStage(0);
</script>
